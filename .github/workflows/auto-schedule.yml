name: 월별 KBO 경기 자동 업데이트

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  update-schedule:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install requests beautifulsoup4

      - name: 경기 일정 자동 업데이트
        env:
          API_URL: ${{ secrets.API_URL }}
        run: python scripts/fetch_schedule.py
